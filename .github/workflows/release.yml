name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: Test
    uses: ./.github/workflows/test.yml

  release:
    name: Release
    needs: [lint, test]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 #v4.4.0
        id: release
        with:
          release-type: go

  publish:
    name: Publish artifacts
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 #v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_PRIVATE_KEY: ${{ secrets.HOMEBREW_TAP_PRIVATE_KEY }}
          WINGET_PKGS_PRIVATE_KEY: ${{ secrets.WINGET_PKGS_PRIVATE_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - uses: actions/github-script@v7
        name: Update release label on PR
        with:
          script: |
            const { data: { items } } = await github.rest.search.issuesAndPullRequests({
              q: `${context.sha} type:pr is:merged`
            });

            const issue = {
              issue_number: items[0].number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            github.rest.issues.addLabels({
              ...issue,
              labels: ["autorelease: published"],
            });

            github.rest.issues.removeLabel({
              ...issue,
              name: "autorelease: tagged",
            });
